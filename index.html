<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Experiment 2, Complex Cognitive Task</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1a1a24; --border:#252535;
    --text:#ddddf0; --muted:#6060a0; --accent:#8b72ff;
    --green:#4ecb8d; --red:#e05555; --gold:#f0c060; --white:#ffffff;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow-x:hidden;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;padding:72px 16px 48px;}

  /* ── Top bar ── */
  #topbar{position:fixed;top:0;left:0;right:0;height:52px;
    background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;z-index:200;}
  .tb-left{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  #timer-display{font-family:'Fraunces',serif;font-size:22px;font-weight:300;color:var(--gold);}
  #timer-display.urgent{color:var(--red);animation:urgPulse 1s infinite;}
  @keyframes urgPulse{0%,100%{opacity:1}50%{opacity:.5}}
  .tb-right{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}

  /* ── Screens ── */
  .screen{display:none;width:100%;max-width:680px;flex-direction:column;gap:20px;animation:fadeUp .4s ease both;}
  .screen.active{display:flex;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* ── Typography ── */
  .chip{display:inline-block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--border);padding:5px 13px;border-radius:100px;}
  h1{font-family:'Fraunces',serif;font-size:clamp(26px,6vw,38px);font-weight:300;line-height:1.2;color:var(--white);}
  h2{font-family:'Fraunces',serif;font-size:clamp(20px,5vw,28px);font-weight:300;color:var(--white);}
  p{font-size:clamp(12px,3vw,14px);line-height:1.8;color:var(--muted);}

  /* ── Surfaces ── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;}
  .divider{height:1px;background:var(--border);}

  /* ── Phase bar ── */
  .phase-bar{display:flex;gap:6px;}
  .phase-seg{flex:1;height:4px;border-radius:100px;background:var(--border);}
  .phase-seg.done{background:var(--green);}
  .phase-seg.cur{background:var(--accent);}

  /* ── Buttons ── */
  .btn{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase;
    padding:15px 24px;border-radius:10px;border:none;cursor:pointer;touch-action:manipulation;
    user-select:none;transition:transform .12s,filter .12s;}
  .btn:active{transform:scale(.96);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn-primary{background:var(--text);color:var(--bg);font-weight:500;width:100%;padding:18px;font-size:13px;}
  .btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border);}
  .btn-outline:hover{border-color:var(--muted);}
  .btn-green{background:rgba(78,203,141,.15);color:var(--green);border:1.5px solid rgba(78,203,141,.4);padding:14px 28px;}
  .btn-green:hover{background:rgba(78,203,141,.25);}
  .btn-red{background:rgba(224,85,85,.15);color:var(--red);border:1.5px solid rgba(224,85,85,.4);padding:14px 28px;}
  .btn-red:hover{background:rgba(224,85,85,.25);}
  .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

  /* ── Info list ── */
  .ilist{list-style:none;display:flex;flex-direction:column;gap:0;}
  .ilist li{display:flex;gap:12px;align-items:flex-start;padding:12px 0;
    border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);line-height:1.7;}
  .ilist li:last-child{border-bottom:none;}
  .ilist .dot{min-width:22px;height:22px;border-radius:50%;background:var(--accent);
    color:var(--bg);display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;margin-top:2px;flex-shrink:0;}

  /* ── Meta row ── */
  .meta-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;
    font-size:12px;color:var(--muted);}
  .meta-row strong{color:var(--text);}

  /* ── Warning box ── */
  .warn{background:rgba(240,192,96,.08);border:1px solid rgba(240,192,96,.25);
    border-radius:10px;padding:14px 16px;font-size:12px;color:var(--gold);line-height:1.7;}

  /* ── Feedback bar ── */
  .fb-bar{padding:12px 16px;border-radius:10px;font-size:12px;letter-spacing:1px;
    text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;min-height:40px;}
  .fb-bar.ok{background:rgba(78,203,141,.1);color:var(--green);border:1px solid rgba(78,203,141,.25);}
  .fb-bar.no{background:rgba(224,85,85,.1);color:var(--red);border:1px solid rgba(224,85,85,.25);}
  .fb-bar.empty{opacity:0;}

  /* ── OSPAN ── */
  .math-box{background:var(--surface2);border:1px solid var(--border);
    border-radius:14px;padding:28px;text-align:center;}
  .math-eq{font-family:'Fraunces',serif;font-size:clamp(26px,7vw,38px);font-weight:300;
    color:var(--white);letter-spacing:.04em;margin-bottom:22px;}

  .letter-box{background:var(--surface2);border:1px solid var(--accent);
    border-radius:14px;padding:48px 32px;text-align:center;}
  .big-letter{font-family:'Fraunces',serif;font-size:clamp(64px,18vw,88px);
    font-weight:300;color:var(--accent);letter-spacing:.1em;}
  .letter-hint{font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:1px;text-transform:uppercase;}

  .recall-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .recall-btn{padding:14px 8px;border:1.5px solid var(--border);border-radius:10px;
    background:var(--surface2);font-family:'Fraunces',serif;font-size:clamp(16px,4vw,22px);
    font-weight:300;cursor:pointer;transition:all .14s;color:var(--text);text-align:center;
    touch-action:manipulation;}
  .recall-btn:hover{border-color:var(--muted);}
  .recall-btn.sel{border-color:var(--accent);background:rgba(139,114,255,.2);color:var(--accent);}
  .sel-display{font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;}
  .sel-display span{color:var(--text);}

  /* ── SYMSPAN ── */
  .sym-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center;}
  @media(max-width:500px){.sym-layout{grid-template-columns:1fr;}}
  .col-label{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);margin-bottom:8px;text-align:center;}
  #sym-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;
    background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .sym-cell{aspect-ratio:1;background:var(--surface2);}
  .sym-cell.on{background:var(--accent);}

  #mat-show{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;
    width:min(180px,45vw);height:min(180px,45vw);margin:0 auto;}
  .mat-cell{background:var(--surface2);border-radius:4px;border:1px solid var(--border);}
  .mat-cell.lit{background:var(--accent);}

  #mat-recall{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    width:min(240px,58vw);height:min(240px,58vw);margin:0 auto 12px;padding:8px;}
  .rcell{background:var(--surface2);border-radius:6px;border:1.5px solid var(--border);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-size:13px;font-weight:300;
    transition:all .12s;color:var(--muted);min-width:0;min-height:0;}
  .rcell:hover{border-color:var(--muted);}
  .rcell.picked{background:rgba(139,114,255,.2);border-color:var(--accent);color:var(--accent);}

  /* ── TMT ── */
  #tmt-canvas{border:1px solid var(--border);border-radius:12px;
